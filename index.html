<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知財2級 実技・実践演習</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: #f4f7f9; padding: 20px; line-height: 1.6; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        
        /* ステータスバーを固定 */
        .status-bar { 
            position: sticky; top: 0; background: white; padding: 15px; 
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin-bottom: 30px; text-align: center; z-index: 100; font-weight: bold;
            border: 2px solid #3498db;
        }

        .exam-card { 
            background: white; padding: 30px; border-radius: 12px; 
            margin-bottom: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 8px solid #ddd; /* 未回答はグレー */
        }
        .exam-card.answered { border-left-color: #3498db; } /* 回答後は青 */

        .case-box { 
            background: #f8f9fa; border: 1px solid #e9ecef; 
            padding: 18px; border-radius: 8px; margin: 15px 0; 
            font-size: 0.95em; color: #495057; line-height: 1.8;
        }

        .q-text { font-weight: bold; font-size: 1.1em; margin-bottom: 20px; color: #2c3e50; }

        .choice-list { display: flex; flex-direction: column; gap: 10px; }
        
        /* ボタンの基本スタイル（最初は色なし） */
        .btn { 
            text-align: left; padding: 15px; border: 2px solid #eee; 
            border-radius: 8px; background: #fff; cursor: pointer; 
            font-size: 16px; transition: all 0.2s; 
        }
        .btn:hover { background: #f8fbff; border-color: #3498db; }

        /* 正解・不正解の明確な色分け */
        .btn.correct { 
            background: #d4edda !important; border-color: #28a745 !important; 
            color: #155724 !important; font-weight: bold; 
            position: relative;
        }
        .btn.correct::after { content: " ✔ 正解"; margin-left: 10px; font-size: 0.8em; }

        .btn.incorrect { 
            background: #f8d7da !important; border-color: #dc3545 !important; 
            color: #721c24 !important; 
        }

        /* 解説エリア（最初は非表示） */
        .exp { 
            display: none; padding: 20px; background: #fff9db; 
            margin-top: 20px; border-radius: 8px; border: 1px dashed #f08c00;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>知財2級 実技シミュレーション</h1></div>
        <div class="status-bar" id="status">読み込み中...</div>
        <div id="quiz-area"></div>
    </div>

    <script src="data.js"></script>
    <script>
        const area = document.getElementById('quiz-area');
        const status = document.getElementById('status');
        let count = 0; let correctNum = 0;

        function build() {
            if (typeof quizData === 'undefined') return;
            quizData.forEach((d, i) => {
                const card = document.createElement('div');
                card.className = 'exam-card';
                card.id = `card-${i}`;
                card.innerHTML = `
                    <div style="color:#888; font-size:0.85em; margin-bottom:5px;">第 ${i+1} 問 / 全${quizData.length}問</div>
                    <div class="case-box"><strong>【事例】</strong><br>${d.case}</div>
                    <div class="q-text">${d.q || "以下の選択肢から適切なものを選びなさい。"}</div>
                    <div class="choice-list" id="choices-${i}">
                        ${d.choices.map((c, ci) => `
                            <button class="btn" onclick="checkAnswer(${i}, ${ci})">${c}</button>
                        `).join('')}
                    </div>
                    <div id="exp-${i}" class="exp">
                        <strong>💡 解説:</strong><br>${d.exp}
                    </div>
                `;
                area.appendChild(card);
            });
            updateStatus();
        }

        function checkAnswer(qi, ci) {
            const d = quizData[qi];
            const card = document.getElementById(`card-${qi}`);
            const exp = document.getElementById(`exp-${qi}`);
            
            // すでに回答済みの場合は何もしない
            if (card.classList.contains('answered')) return;

            const buttons = document.getElementById(`choices-${qi}`).getElementsByClassName('btn');
            
            // 正解・不正解の判定
            if (ci === d.ans) {
                buttons[ci].classList.add('correct');
                correctNum++;
            } else {
                buttons[ci].classList.add('incorrect');
                buttons[d.ans].classList.add('correct'); // 正解を強調
            }

            // 状態の更新
            card.classList.add('answered');
            exp.style.display = 'block';
            count++;
            updateStatus();
        }

        function updateStatus() {
            const rate = count > 0 ? Math.round((correctNum / count) * 100) : 0;
            status.innerText = `進捗: ${count} / ${quizData.length} 完了 | 正答率: ${rate}%`;
        }

        window.onload = build;
    </script>
</body>
</html>
